<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 5</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    <style>* { font-family: 'Geist', sans-serif; }</style>
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">

    <!-- Login Card -->
    <div id="log-in-card" class="flex items-center justify-center min-h-screen px-4 py-10">
      <div class="bg-white rounded-2xl shadow-md w-full max-w-md px-6 sm:px-10 py-8 sm:py-10">
        <div class="flex flex-col items-center mb-6">
          <div class="w-[60px] sm:w-[70px] mb-2">
            <img src="assets/github-logo.png" alt="GitHub Logo" />
          </div>
          <h1 class="text-xl sm:text-2xl font-bold text-gray-900 text-center">GitHub Issues Tracker</h1>
          <p class="text-xs sm:text-sm text-gray-400 mt-1 text-center">Sign in to manage your issues</p>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-800 mb-1">Username</label>
          <input id="user-name" type="text" placeholder="Enter Username"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <p class="text-xs text-indigo-500 mt-1">Default: admin</p>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-800 mb-1">Password</label>
          <input id="password" type="password" placeholder="Enter Password"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <p class="text-xs text-indigo-500 mt-1">Default: admin123</p>
        </div>

        <button onclick="loadMainPage()" id="sign-in-btn"
          class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg active:scale-95 active:bg-indigo-800 transition-all duration-150 text-sm sm:text-base">
          Sign In
        </button>

        <div class="flex items-center my-5">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="mx-3 text-xs text-gray-400">OR</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <div class="bg-gray-50 border border-gray-200 rounded-lg px-5 py-3 text-center text-sm text-gray-700">
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </div>

    <!-- Main Page -->
    <section id="main-page" class="hidden">

      <!-- Navbar -->
      <nav class="bg-white px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-5 shadow-sm">
        <div class="flex items-center gap-2">
          <img src="assets/github-logo.png" class="w-6 sm:w-7" alt="Logo" />
          <span class="font-semibold text-gray-900 text-sm sm:text-base">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center gap-2 w-full sm:w-auto">
          <label class="input flex-1 sm:flex-none sm:w-64">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input id="search-input" type="search" required placeholder="Search issues..." class="w-full" />
          </label>
          <button id="search-btn" class="btn btn-primary text-xs sm:text-sm whitespace-nowrap px-3 sm:px-4">+ New Issue</button>
        </div>
      </nav>

      <!-- Filter Buttons -->
      <div class="w-[95%] sm:w-[90%] lg:w-[80%] mx-auto bg-white p-3 sm:p-4 flex flex-wrap gap-2 sm:gap-3 rounded-md shadow-sm mb-3">
        <button class="all buttons btn btn-primary px-5 sm:px-8 text-xs sm:text-sm">All</button>
        <button class="buttons btn px-5 sm:px-8 text-xs sm:text-sm">Open</button>
        <button class="buttons btn px-5 sm:px-8 text-xs sm:text-sm">Closed</button>
      </div>

      <!-- Spinner -->
      <div id="spinner" class="text-center hidden py-6">
        <span class="loading loading-spinner loading-xl"></span>
      </div>

      <!-- Header Bar -->
      <div class="w-[95%] sm:w-[90%] lg:w-[80%] mx-auto bg-white rounded-t-md shadow-sm border border-gray-100 px-4 sm:px-6 py-3 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 border-b-2">
        <div class="flex items-center gap-3 sm:gap-4">
          <div class="w-10 h-10 sm:w-12 sm:h-12 bg-[#ECE4FF] flex justify-center items-center rounded-full shrink-0">
            <img class="w-6 sm:w-8" src="assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2 id="num-of-data" class="text-sm sm:text-base font-bold text-gray-900"></h2>
            <p class="text-xs sm:text-sm text-gray-400">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-4 sm:gap-5 pl-14 sm:pl-0">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
            <span class="text-xs sm:text-sm text-gray-600">Open</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-purple-400 inline-block"></span>
            <span class="text-xs sm:text-sm text-gray-600">Closed</span>
          </div>
        </div>
      </div>

      <!-- Cards Grid - Main -->
      <section id="card-box"
        class="w-[95%] sm:w-[90%] lg:w-[80%] mx-auto bg-white p-4 sm:p-6 lg:p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 rounded-b-md shadow-sm mb-10">
      </section>

      <!-- Cards Grid - Search Results -->
      <section id="card-box2"
        class="w-[95%] sm:w-[90%] lg:w-[80%] mx-auto bg-white p-4 sm:p-6 lg:p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 rounded-b-md shadow-sm mb-10">
      </section>
    </section>

    <!-- Modal -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box w-full sm:max-w-lg">
        <div id="modal-container"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-primary w-full sm:w-auto">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
